<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reliable Male Voice Downloader</title>
    <style>
        body {
            font-family: sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #444;
        }
        select, textarea, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #555;
            background: #333;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #007bff;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
        button:hover { background: #0056b3; }
        .note { font-size: 12px; color: #aaa; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h3 style="text-align:center; margin-top:0;">Male Voice Downloader</h3>
    
    <label>Pick a Voice:</label>
    <select id="voice">
        <option value="Brian">Brian (Male - UK)</option>
        <option value="Joey">Joey (Male - US)</option>
        <option value="Justin">Justin (Male - US)</option>
        <option value="Russell">Russell (Male - AU)</option>
        <option value="Matthew">Matthew (Male - US)</option>
        <option value="Guy">Guy (Male - UK)</option>
    </select>

    <label>Type Text:</label>
    <textarea id="text" rows="4" placeholder="Type here..."></textarea>

    <button onclick="downloadAudio()">Download MP3</button>
    <p class="note">If download fails, a new tab will open. Right-click and "Save Audio As".</p>
</div>

<script>
    async function downloadAudio() {
        const voice = document.getElementById('voice').value;
        const text = document.getElementById('text').value;

        if(!text) return alert("Please type something!");

        // 1. The StreamElements API URL
        const url = `https://api.streamelements.com/kappa/v2/speech?voice=${voice}&text=${encodeURIComponent(text)}`;

        // 2. Try to download using a Proxy (corsproxy.io)
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;

        try {
            const response = await fetch(proxyUrl);
            const blob = await response.blob();
            
            // Create download link
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = "voice.mp3";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        } 
        catch (error) {
            // 3. FALLBACK: If proxy fails, just open in new tab
            alert("Auto-download blocked. Opening in new tab...");
            window.open(url, '_blank');
        }
    }
</script>

</body>
</html>
