<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed MP3 Downloader</title>
    <style>
        body {
            font-family: sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #444;
        }
        select, textarea, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #555;
            background: #333;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #28a745; /* Green for success */
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
        button:hover { background: #218838; }
        .note { font-size: 12px; color: #aaa; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h3 style="text-align:center; margin-top:0;">MP3 Downloader (Fixed)</h3>
    
    <label>Pick a Voice:</label>
    <select id="voice">
        <option value="Brian">Brian (Male - UK)</option>
        <option value="Joey">Joey (Male - US)</option>
        <option value="Justin">Justin (Male - US)</option>
        <option value="Russell">Russell (Male - AU)</option>
        <option value="Matthew">Matthew (Male - US)</option>
        <option value="Guy">Guy (Male - UK)</option>
        <option value="Amy">Amy (Female - UK)</option>
    </select>

    <label>Type Text:</label>
    <textarea id="text" rows="4" placeholder="Type here..."></textarea>

    <button onclick="downloadAudio()">Download Clean MP3</button>
    <p class="note">Uses Base64 transfer to prevent corruption.</p>
</div>

<script>
    async function downloadAudio() {
        const voice = document.getElementById('voice').value;
        const text = document.getElementById('text').value;

        if(!text) return alert("Please type something!");

        const btn = document.querySelector('button');
        btn.textContent = "Processing...";
        btn.disabled = true;

        try {
            // 1. The StreamElements URL
            const url = `https://api.streamelements.com/kappa/v2/speech?voice=${voice}&text=${encodeURIComponent(text)}`;

            // 2. Use allorigins to get data as Base64 JSON (Safe transfer)
            // We use '/get' so it returns JSON with the audio inside
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            
            const response = await fetch(proxyUrl);
            const data = await response.json();

            if (!data.contents) throw new Error("No data received");

            // 3. Convert Base64 string back to Binary Data (MP3)
            const base64Audio = data.contents;
            const binaryString = window.atob(base64Audio);
            const bytes = new Uint8Array(binaryString.length);
            
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            // 4. Create Blob with correct MIME type
            const blob = new Blob([bytes], { type: 'audio/mpeg' });
            
            // 5. Download
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = `${voice}_audio.mp3`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
        } catch (error) {
            console.error(error);
            alert("Error. Try shorter text.");
        } finally {
            btn.textContent = "Download Clean MP3";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
