<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Audio Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #202124;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #303134;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 450px;
        }
        h2 { margin-top: 0; color: #8ab4f8; }
        
        select, textarea, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #5f6368;
            background: #202124;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #8ab4f8;
            color: #202124;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover { background: #aecbfa; }
        
        .tip {
            font-size: 13px;
            color: #9aa0a6;
            margin-top: 10px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Google Audio Generator</h2>
    
    <label style="font-size:14px; color:#9aa0a6;">Select Language (Google Voices)</label>
    <select id="lang">
        <!-- These languages often use Male voices in Google Translate -->
        <option value="pt-BR">Portuguese (Brazil) - Male</option>
        <option value="ru-RU">Russian - Male</option>
        <option value="id-ID">Indonesian - Male</option>
        <option value="ar-EG">Arabic (Egypt) - Male</option>
        <option value="tr-TR">Turkish - Male</option>
        <option value="th-TH">Thai - Male</option>
        <option value="en">English (US) - Female (Default)</option>
    </select>

    <textarea id="text" rows="4" placeholder="Type your text here..."></textarea>

    <button onclick="playAudio()">1. Play Audio (Opens Tab)</button>
    
    <div class="tip">
        <strong>How to Download:</strong><br>
        1. Click the button above.<br>
        2. Audio opens in new tab.<br>
        3. <strong>Right-Click</strong> the audio player.<br>
        4. Choose <strong>"Save Audio As..."</strong>
    </div>
</div>

<script>
    function playAudio() {
        const text = document.getElementById('text').value;
        const lang = document.getElementById('lang').value;

        if (!text) return alert("Please type some text!");

        // 1. Create the Official Google Translate URL
        // client=tw-ob is required for this to work without an API key
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${lang}&client=tw-ob`;

        // 2. Open in new tab (This never fails)
        window.open(url, '_blank');
    }
</script>

</body>
</html>
