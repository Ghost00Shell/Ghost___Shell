<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Text to MP3 Downloader</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        h1 {
            margin-top: 0;
            text-align: center;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            resize: vertical;
            font-family: inherit;
        }

        select {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: #4f46e5;
        }

        button:disabled {
            background: var(--border);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MP3 Generator</h1>
        
        <div class="form-group">
            <label for="voiceSelect">Select Voice</label>
            <select id="voiceSelect">
                <option value="Brian">Brian (UK Male)</option>
                <option value="Amy">Amy (UK Female)</option>
                <option value="Emma">Emma (UK Female)</option>
                <option value="Russell">Russell (AU Male)</option>
                <option value="Joey">Joey (US Male)</option>
                <option value="Justin">Justin (US Male)</option>
                <option value="Matthew">Matthew (US Male)</option>
                <option value="Ivy">Ivy (US Child)</option>
                <option value="Geraint">Geraint (UK Male - Welles)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="textInput">Enter Text</label>
            <textarea id="textInput" placeholder="Type what you want to convert to MP3..."></textarea>
        </div>

        <button id="downloadBtn">
            <span class="spinner" id="spinner"></span>
            <span id="btnText">Download MP3</span>
        </button>
    </div>

    <script>
        const downloadBtn = document.getElementById('downloadBtn');
        const textInput = document.getElementById('textInput');
        const voiceSelect = document.getElementById('voiceSelect');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');

        downloadBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            const voice = voiceSelect.value;

            if (!text) {
                alert("Please enter some text first.");
                return;
            }

            // 1. Show Loading State
            downloadBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = "Generating...";

            try {
                // 2. Call the StreamElements API
                // We use encodeURIComponent to handle spaces and special characters
                const apiUrl = `https://api.streamelements.com/kappa/v2/speech?voice=${voice}&text=${encodeURIComponent(text)}`;
                
                // 3. Fetch the audio data as a Blob
                const response = await fetch(apiUrl);
                
                if (!response.ok) throw new Error("Failed to generate audio");

                const blob = await response.blob();
                
                // 4. Create a download link
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                // Generate filename based on first few words
                const filename = text.split(' ').slice(0, 3).join('_').replace(/[^a-z0-9_]/gi, '') || 'audio';
                a.download = `${filename}.mp3`;
                
                document.body.appendChild(a);
                a.click();
                
                // 5. Cleanup
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

            } catch (error) {
                console.error(error);
                alert("Error generating audio. Please check your internet connection.");
            } finally {
                // Reset button state
                downloadBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = "Download MP3";
            }
        });
    </script>
</body>
</html>
